name: Update pre-season data

on:
  schedule:
    # 07:00 and 15:00 UK time during BST - catches overnight US-tour
    # results before breakfast and Asia-tour games by mid-afternoon.
    - cron: "0 6,14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Fetch latest pre-season data
        run: python pipeline/update.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/matches.json
          if git diff --cached --quiet; then
            echo "No changes this run."
          else
            git commit -m "Update pre-season data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
